<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>📚 Biblioteca de Elena</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0d0d0d">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Biblioteca">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="icon" href="icons/icon-192.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="top-bar">
  <h1>📚 Biblioteca de Elena</h1>
</div>

<div id="shelf-container">
  <div id="shelf-wrapper">
    <img id="shelf-img" src="img/estanteria.png" alt="Estantería con los libros">

    <!-- FILA 1: La Bendición Oficial del Cielo 1-3, VA Academia de Vampiros, VA Sangre Fría -->
    <div class="book-zone" data-book="va1"    style="left:4.5%; top:14%; width:16%; height:37%;"></div>
    <div class="book-zone" data-book="va2"    style="left:21%;  top:14%; width:16%; height:37%;"></div>
    <div class="book-zone" data-book="va3a"   style="left:38%;  top:14%; width:16%; height:37%;"></div>
    <div class="book-zone" data-book="va-s1"  style="left:55%;  top:14%; width:18%; height:37%;"></div>
    <div class="book-zone" data-book="va-s2"  style="left:74%;  top:14%; width:18%; height:37%;"></div>

    <!-- FILA 2: VA Bendecida por las Sombras, Promesa de Sangre, Vínculo de Espíritu, El Último Sacrificio, Black Bird -->
    <div class="book-zone" data-book="va3b" style="left:4.5%; top:51%; width:16%; height:22%;"></div>
    <div class="book-zone" data-book="va4"  style="left:21%;  top:51%; width:16%; height:22%;"></div>
    <div class="book-zone" data-book="va5"  style="left:38%;  top:51%; width:16%; height:22%;"></div>
    <div class="book-zone" data-book="va6"  style="left:55%;  top:51%; width:16%; height:22%;"></div>
    <div class="book-zone" data-book="bb1"  style="left:72%;  top:51%; width:20%; height:22%;"></div>

    <!-- FILA 3: Crepúsculo, Luna Nueva, Eclipse, Amanecer, Sol de Medianoche -->
    <div class="book-zone" data-book="tw1" style="left:4.5%; top:74%; width:16%; height:24%;"></div>
    <div class="book-zone" data-book="tw2" style="left:21%;  top:74%; width:16%; height:24%;"></div>
    <div class="book-zone" data-book="tw3" style="left:38%;  top:74%; width:16%; height:24%;"></div>
    <div class="book-zone" data-book="tw4" style="left:55%;  top:74%; width:16%; height:24%;"></div>
    <div class="book-zone" data-book="tw5" style="left:72%;  top:74%; width:20%; height:24%;"></div>
  </div>
</div>

<!-- OVERLAY -->
<div id="overlay">
  <div id="panel">
    <div id="panel-header">
      <button id="close-btn" onclick="closePanel()">✕</button>
      <div id="panel-book-thumb"></div>
      <div id="panel-title">
        <h2 id="panel-title-text"></h2>
        <p id="panel-author-text"></p>
      </div>
    </div>

    <div id="chapters-scroll">
      <div class="section-label">— CAPÍTULOS —</div>
      <div id="chapters-container"></div>
      <button class="add-ch-btn" onclick="addChapter()">+ AÑADIR CAPÍTULO</button>
    </div>

    <div id="player">
      <div id="now-playing">▶ <span id="track-name">—</span></div>
      <div class="player-row">
        <button class="p-btn main" id="play-pause-btn" onclick="togglePlay()">▶</button>
        <button class="p-btn" onclick="skip(-15)" title="-15s">«15</button>
        <button class="p-btn" onclick="skip(30)" title="+30s">30»</button>
        <div class="progress-area">
          <div class="prog-bar" onclick="seek(event)">
            <div class="prog-fill" id="prog-fill"></div>
          </div>
          <div class="time-row">
            <span id="t-cur">0:00</span>
            <span id="t-tot">0:00</span>
          </div>
        </div>
        <div class="vol-row">
          <span class="vol-label">VOL</span>
          <input type="range" min="0" max="1" step="0.05" value="1" oninput="setVol(this.value)">
        </div>
      </div>
    </div>
  </div>
</div>

<input type="file" id="file-input" accept="audio/*">

<!-- TOAST DE INSTALACIÓN PWA -->
<div id="install-toast">
  <p>Instala la app en tu pantalla de inicio para acceso rápido</p>
  <button onclick="installApp()">Instalar</button>
  <button class="dismiss" onclick="dismissInstall()">✕</button>
</div>

<script src="js/app.js"></script>
</body>
</html>
